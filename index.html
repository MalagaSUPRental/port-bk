  <script type="text/babel">
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    const FadingVideo = ({ src, className, style }) => {
      const videoRef = React.useRef(null);
      const rafRef = React.useRef(null);
      const fadingOutRef = React.useRef(false);

      const fadeTo = (target, duration) => {
        const video = videoRef.current;
        if (!video) return;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const start = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();
        const step = (now) => {
          const t = Math.min((now - startTime) / duration, 1);
          video.style.opacity = String(start + (target - start) * t);
          if (t < 1) {
            rafRef.current = requestAnimationFrame(step);
          }
        };
        rafRef.current = requestAnimationFrame(step);
      };

      React.useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoaded = () => {
          video.style.opacity = "0";
          const p = video.play();
          if (p && p.catch) p.catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!video.duration) return;
          const remaining = video.duration - video.currentTime;
          if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = "0";
          setTimeout(() => {
            video.currentTime = 0;
            const p = video.play();
            if (p && p.catch) p.catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoaded);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener("loadeddata", onLoaded);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          className={className}
          style={{ ...style, opacity: 0 }}
          autoPlay
          muted
          playsInline
          preload="auto"
          src={src}
        />
      );
    };

    window.FadingVideo = FadingVideo;
  </script>

  <!-- ==================== BlurText ==================== -->
  <script type="text/babel">
    const BlurText = ({ text, className }) => {
      const { motion } = window.Motion;
      const ref = React.useRef(null);
      const [inView, setInView] = React.useState(false);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting) {
              setInView(true);
              observer.unobserve(el);
            }
          },
          { threshold: 0.1 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <p
          ref={ref}
          className={className}
          style={{
            display: "flex",
            flexWrap: "wrap",
            justifyContent: "center",
            rowGap: "0.1em",
          }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={
                inView
                  ? {
                      filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    };

    window.BlurText = BlurText;
  </script>
